apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ecommerce
  namespace: ecommerce
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: 50m
spec:
  ingressClassName: nginx
  rules:
    - host: ecommerce.local
      http:
        paths:
          - path: /api/products
            pathType: Prefix
            backend:
              service:
                name: catalog
                port:
                  number: 8001
          - path: /api/categories
            pathType: Exact
            backend:
              service:
                name: catalog
                port:
                  number: 8001
          - path: /api/quote
            pathType: Exact
            backend:
              service:
                name: catalog
                port:
                  number: 8001
          - path: /api/health
            pathType: Exact
            backend:
              service:
                name: catalog
                port:
                  number: 8001
          - path: /chat
            pathType: Exact
            backend:
              service:
                name: chatbot
                port:
                  number: 8000
          - path: /health
            pathType: Exact
            backend:
              service:
                name: chatbot
                port:
                  number: 8000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80
