---
apiVersion: v1
kind: Service
metadata:
  name: prefect-server
  namespace: ecommerce
spec:
  ports:
    - port: 4200
      targetPort: 4200
  selector:
    app: prefect-server
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prefect-server
  namespace: ecommerce
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prefect-server
  template:
    metadata:
      labels:
        app: prefect-server
    spec:
      containers:
        - name: server
          image: prefecthq/prefect:3-latest
          command:
            - prefect
            - server
            - start
            - --host
            - 0.0.0.0
          ports:
            - containerPort: 4200
          env:
            - name: PREFECT_SERVER_API_HOST
              value: "0.0.0.0"
            - name: PREFECT_API_DATABASE_CONNECTION_URL
              valueFrom:
                secretKeyRef:
                  name: database-url
                  key: prefect-connection-url
            - name: PREFECT_UI_ENABLED
              value: "true"
          resources:
            requests:
              memory: 512Mi
              cpu: 256m
            limits:
              memory: 1Gi
              cpu: 1
          readinessProbe:
            httpGet:
              path: /health
              port: 4200
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 4200
            initialDelaySeconds: 30
            periodSeconds: 20
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prefect-agent
  namespace: ecommerce
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prefect-agent
  template:
    metadata:
      labels:
        app: prefect-agent
    spec:
      containers:
        - name: agent
          image: backend:latest
          command:
            - prefect
            - agent
            - start
            - --pool
            - default
          env:
            - name: PREFECT_API_URL
              value: http://prefect-server:4200/api
            - name: CHROMA_DB_PATH
              value: /app/data/chroma_shipping_db
            - name: SENTENCE_TRANSFORMERS_HOME
              value: /cache
          volumeMounts:
            - name: chroma-storage
              mountPath: /app/data/chroma_shipping_db
            - name: model-cache
              mountPath: /cache
          resources:
            requests:
              memory: 512Mi
              cpu: 256m
            limits:
              memory: 2Gi
              cpu: 1
      volumes:
        - name: chroma-storage
          persistentVolumeClaim:
            claimName: chroma-pvc
        - name: model-cache
          persistentVolumeClaim:
            claimName: model-cache-pvc
