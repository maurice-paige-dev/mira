---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards
  namespace: ecommerce
data:
  service-red-metrics.json: |
    {
      "title": "Service RED Metrics",
      "version": 2,
      "time": { "from": "now-1h", "to": "now" },
      "timepicker": { "refresh_intervals": ["5s", "10s", "30s", "1m", "5m", "15m", "30m", "1h"] },
      "tags": ["ecommerce", "red"],
      "schemaVersion": 38,
      "panels": [
        {
          "title": "Request Rate",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 8, "x": 0, "y": 0 },
          "targets": [{
            "expr": "rate(http_requests_total[1m])",
            "legendFormat": "{{method}} {{path}} {{status}}"
          }],
          "datasource": "Prometheus"
        },
        {
          "title": "Error Rate (5xx)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 8, "x": 8, "y": 0 },
          "targets": [{
            "expr": "rate(http_requests_total{status=~\"5..\"}[1m])",
            "legendFormat": "{{method}} {{path}}"
          }],
          "datasource": "Prometheus"
        },
        {
          "title": "4xx Rate",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 8, "x": 16, "y": 0 },
          "targets": [{
            "expr": "rate(http_requests_total{status=~\"4..\"}[1m])",
            "legendFormat": "{{method}} {{path}}"
          }],
          "datasource": "Prometheus"
        },
        {
          "title": "Request Latency (p50)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 8, "x": 0, "y": 8 },
          "targets": [{
            "expr": "histogram_quantile(0.50, rate(http_request_duration_seconds_bucket[1m]))",
            "legendFormat": "{{method}} {{path}}"
          }],
          "datasource": "Prometheus"
        },
        {
          "title": "Request Latency (p95)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 8, "x": 8, "y": 8 },
          "targets": [{
            "expr": "histogram_quantile(0.95, rate(http_request_duration_seconds_bucket[1m]))",
            "legendFormat": "{{method}} {{path}}"
          }],
          "datasource": "Prometheus"
        },
        {
          "title": "Request Latency (p99)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 8, "x": 16, "y": 8 },
          "targets": [{
            "expr": "histogram_quantile(0.99, rate(http_request_duration_seconds_bucket[1m]))",
            "legendFormat": "{{method}} {{path}}"
          }],
          "datasource": "Prometheus"
        },
        {
          "title": "Service Uptime",
          "type": "stat",
          "gridPos": { "h": 4, "w": 4, "x": 0, "y": 16 },
          "targets": [{
            "expr": "up{job=~\"catalog|chatbot\"}"
          }],
          "datasource": "Prometheus"
        },
        {
          "title": "Catalog API Health",
          "type": "stat",
          "gridPos": { "h": 4, "w": 4, "x": 4, "y": 16 },
          "targets": [{
            "expr": "http_requests_total{path=\"/api/health\",status=\"200\"}"
          }],
          "datasource": "Prometheus"
        },
        {
          "title": "Chatbot API Health",
          "type": "stat",
          "gridPos": { "h": 4, "w": 4, "x": 8, "y": 16 },
          "targets": [{
            "expr": "http_requests_total{path=\"/health\",status=\"200\"}"
          }],
          "datasource": "Prometheus"
        },
        {
          "title": "Active Sessions",
          "type": "stat",
          "gridPos": { "h": 4, "w": 4, "x": 12, "y": 16 },
          "targets": [{
            "expr": "sessions_active_total"
          }],
          "datasource": "Prometheus"
        }
      ]
    }
  pipeline-metrics.json: |
    {
      "title": "Pipeline Metrics",
      "version": 2,
      "time": { "from": "now-1h", "to": "now" },
      "timepicker": { "refresh_intervals": ["5s", "10s", "30s", "1m", "5m", "15m", "30m", "1h"] },
      "tags": ["ecommerce", "pipeline"],
      "schemaVersion": 38,
      "panels": [
        {
          "title": "Kafka Messages Produced",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 6, "x": 0, "y": 0 },
          "targets": [{
            "expr": "rate(kafka_messages_produced_total[1m])",
            "legendFormat": "topic={{topic}}"
          }],
          "datasource": "Prometheus"
        },
        {
          "title": "Kafka Messages Consumed",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 6, "x": 6, "y": 0 },
          "targets": [{
            "expr": "rate(kafka_messages_consumed_total[1m])",
            "legendFormat": "topic={{topic}}"
          }],
          "datasource": "Prometheus"
        },
        {
          "title": "DLQ Rate",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 6, "x": 12, "y": 0 },
          "targets": [{
            "expr": "rate(kafka_dlq_messages_total[1m])",
            "legendFormat": "reason={{reason}}"
          }],
          "datasource": "Prometheus"
        },
        {
          "title": "Consumer Lag",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 6, "x": 18, "y": 0 },
          "targets": [{
            "expr": "consumer_lag_total",
            "legendFormat": "partition={{partition}}"
          }],
          "datasource": "Prometheus"
        },
        {
          "title": "Products Ingested",
          "type": "stat",
          "gridPos": { "h": 6, "w": 4, "x": 0, "y": 8 },
          "targets": [{
            "expr": "rate(products_ingested_total[1m])"
          }],
          "datasource": "Prometheus"
        },
        {
          "title": "ChromaDB Document Count",
          "type": "stat",
          "gridPos": { "h": 6, "w": 4, "x": 4, "y": 8 },
          "targets": [{
            "expr": "chroma_documents_total"
          }],
          "datasource": "Prometheus"
        },
        {
          "title": "Consumer Last Success",
          "type": "stat",
          "gridPos": { "h": 6, "w": 4, "x": 8, "y": 8 },
          "targets": [{
            "expr": "time() - consumer_last_success_timestamp"
          }],
          "datasource": "Prometheus"
        },
        {
          "title": "Prefect Flow State",
          "type": "timeseries",
          "gridPos": { "h": 6, "w": 6, "x": 12, "y": 14 },
          "targets": [
            {
              "expr": "prefect_flow_state{state=\"completed\"}",
              "legendFormat": "completed — {{flow_name}}"
            },
            {
              "expr": "prefect_flow_state{state=\"failed\"}",
              "legendFormat": "failed — {{flow_name}}"
            },
            {
              "expr": "prefect_flow_state{state=\"running\"}",
              "legendFormat": "running — {{flow_name}}"
            },
            {
              "expr": "prefect_flow_state{state=\"crashed\"}",
              "legendFormat": "crashed — {{flow_name}}"
            }
          ],
          "datasource": "Prometheus"
        },
        {
          "title": "DB Query Duration (p50)",
          "type": "timeseries",
          "gridPos": { "h": 6, "w": 6, "x": 12, "y": 8 },
          "targets": [{
            "expr": "histogram_quantile(0.50, rate(db_query_duration_seconds_bucket[1m]))",
            "legendFormat": "operation={{operation}}"
          }],
          "datasource": "Prometheus"
        },
        {
          "title": "DB Query Duration (p99)",
          "type": "timeseries",
          "gridPos": { "h": 6, "w": 6, "x": 18, "y": 8 },
          "targets": [{
            "expr": "histogram_quantile(0.99, rate(db_query_duration_seconds_bucket[1m]))",
            "legendFormat": "operation={{operation}}"
          }],
          "datasource": "Prometheus"
        }
      ]
    }
  operational-overview.json: |
    {
      "title": "Operational Overview",
      "version": 1,
      "time": { "from": "now-6h", "to": "now" },
      "timepicker": { "refresh_intervals": ["5s", "10s", "30s", "1m", "5m", "15m", "30m", "1h"] },
      "tags": ["ecommerce", "operations"],
      "schemaVersion": 38,
      "panels": [
        {
          "title": "Agent Call Rate",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 8, "x": 0, "y": 0 },
          "targets": [{
            "expr": "rate(agent_calls_total[1m])",
            "legendFormat": "{{agent}} — {{action}}"
          }],
          "datasource": "Prometheus"
        },
        {
          "title": "Agent Latency (p50 / p95)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 8, "x": 8, "y": 0 },
          "targets": [
            {
              "expr": "histogram_quantile(0.50, rate(agent_latency_seconds_bucket[1m]))",
              "legendFormat": "p50 — {{agent}}"
            },
            {
              "expr": "histogram_quantile(0.95, rate(agent_latency_seconds_bucket[1m]))",
              "legendFormat": "p95 — {{agent}}"
            }
          ],
          "datasource": "Prometheus"
        },
        {
          "title": "Tool Call Success Rate",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 8, "x": 16, "y": 0 },
          "targets": [{
            "expr": "rate(tool_calls_total{status=\"success\"}[1m]) / rate(tool_calls_total[1m]) * 100",
            "legendFormat": "{{agent}} — {{tool}}"
          }],
          "datasource": "Prometheus"
        },
        {
          "title": "Image CDN — Upload Rate",
          "type": "timeseries",
          "gridPos": { "h": 6, "w": 6, "x": 0, "y": 8 },
          "targets": [{
            "expr": "rate(images_uploaded_total[1m])",
            "legendFormat": "variant={{variant}}"
          }],
          "datasource": "Prometheus"
        },
        {
          "title": "Image CDN — Serve Rate",
          "type": "timeseries",
          "gridPos": { "h": 6, "w": 6, "x": 6, "y": 8 },
          "targets": [{
            "expr": "rate(images_served_total[1m])",
            "legendFormat": "variant={{variant}}"
          }],
          "datasource": "Prometheus"
        },
        {
          "title": "CDN Bandwidth",
          "type": "timeseries",
          "gridPos": { "h": 6, "w": 6, "x": 12, "y": 8 },
          "targets": [{
            "expr": "rate(cdn_bandwidth_bytes_total[1m])",
            "legendFormat": "bytes/s"
          }],
          "datasource": "Prometheus"
        },
        {
          "title": "Active Chat Sessions",
          "type": "stat",
          "gridPos": { "h": 6, "w": 6, "x": 18, "y": 8 },
          "targets": [{
            "expr": "sessions_active_total"
          }],
          "datasource": "Prometheus"
        },
        {
          "title": "Error Budget (30d SLA 99.9%)",
          "type": "gauge",
          "gridPos": { "h": 6, "w": 6, "x": 0, "y": 14 },
          "targets": [{
            "expr": "1 - (sum(rate(http_requests_total{status=~\"5..\"}[30d])) / sum(rate(http_requests_total[30d])))",
            "legendFormat": "Availability"
          }],
          "datasource": "Prometheus"
        },
        {
          "title": "Total API Requests (30d)",
          "type": "stat",
          "gridPos": { "h": 6, "w": 4, "x": 6, "y": 14 },
          "targets": [{
            "expr": "sum(increase(http_requests_total[30d]))"
          }],
          "datasource": "Prometheus"
        },
        {
          "title": "Total Products Ingested (30d)",
          "type": "stat",
          "gridPos": { "h": 6, "w": 4, "x": 10, "y": 14 },
          "targets": [{
            "expr": "sum(increase(products_ingested_total[30d]))"
          }],
          "datasource": "Prometheus"
        },
        {
          "title": "Total Images Uploaded (30d)",
          "type": "stat",
          "gridPos": { "h": 6, "w": 4, "x": 14, "y": 14 },
          "targets": [{
            "expr": "sum(increase(images_uploaded_total[30d]))"
          }],
          "datasource": "Prometheus"
        },
        {
          "title": "Kafka Throughput (30d)",
          "type": "stat",
          "gridPos": { "h": 6, "w": 6, "x": 18, "y": 14 },
          "targets": [{
            "expr": "sum(increase(kafka_messages_consumed_total[30d]))"
          }],
          "datasource": "Prometheus"
        }
      ]
    }
