---
apiVersion: v1
kind: Service
metadata:
  name: chatbot
  namespace: ecommerce
spec:
  ports:
    - port: 8000
      targetPort: 8000
  selector:
    app: chatbot
---
apiVersion: v1
kind: Service
metadata:
  name: catalog
  namespace: ecommerce
spec:
  ports:
    - port: 8001
      targetPort: 8001
  selector:
    app: catalog
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: chatbot
  namespace: ecommerce
spec:
  replicas: 2
  selector:
    matchLabels:
      app: chatbot
  template:
    metadata:
      labels:
        app: chatbot
    spec:
      initContainers:
        - name: init-chromadb
          image: backend:latest
          command:
            - /bin/sh
            - -c
            - |
              if ls /app/data/csv/*.csv >/dev/null 2>&1; then
                echo "Building ChromaDB from CSV data ..."
                python -m backend.vector_store --no-interactive
              else
                echo "No CSV data. Creating empty ChromaDB collection ..."
                python -c "
              import chromadb, pathlib, sys
              from chromadb.config import Settings
              d = pathlib.Path('/app/data/chroma_shipping_db')
              d.mkdir(parents=True, exist_ok=True)
              chromadb.PersistentClient(path=str(d), settings=Settings(anonymized_telemetry=False)).get_or_create_collection(name='shipping_advisor', metadata={'hnsw:space': 'cosine'})
              print('Empty ChromaDB collection ready')
              "
              fi
          volumeMounts:
            - name: csv-storage
              mountPath: /app/data/csv
            - name: chroma-storage
              mountPath: /app/data/chroma_shipping_db
          resources:
            requests:
              memory: 512Mi
              cpu: 256m
            limits:
              memory: 2Gi
              cpu: 1
      containers:
        - name: chatbot
          image: backend:latest
          command:
            - uvicorn
            - backend.api_rag:app
            - --host
            - 0.0.0.0
            - --port
            - "8000"
          ports:
            - containerPort: 8000
          env:
            - name: CHROMA_DB_PATH
              value: /app/data/chroma_shipping_db
            - name: SENTENCE_TRANSFORMERS_HOME
              value: /cache
          volumeMounts:
            - name: chroma-storage
              mountPath: /app/data/chroma_shipping_db
          resources:
            requests:
              memory: 512Mi
              cpu: 256m
            limits:
              memory: 2Gi
              cpu: 1
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 15
      volumes:
        - name: csv-storage
          persistentVolumeClaim:
            claimName: csv-pvc
        - name: chroma-storage
          persistentVolumeClaim:
            claimName: chroma-pvc
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: catalog
  namespace: ecommerce
spec:
  replicas: 2
  selector:
    matchLabels:
      app: catalog
  template:
    metadata:
      labels:
        app: catalog
    spec:
      containers:
        - name: catalog
          image: backend:latest
          command:
            - uvicorn
            - backend.api_catalog:app
            - --host
            - 0.0.0.0
            - --port
            - "8001"
          ports:
            - containerPort: 8001
          volumeMounts:
            - name: csv-storage
              mountPath: /app/data/csv
          resources:
            requests:
              memory: 512Mi
              cpu: 256m
            limits:
              memory: 2Gi
              cpu: 1
          readinessProbe:
            httpGet:
              path: /api/health
              port: 8001
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: 8001
            initialDelaySeconds: 15
            periodSeconds: 15
      volumes:
        - name: csv-storage
          persistentVolumeClaim:
            claimName: csv-pvc
