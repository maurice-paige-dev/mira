apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: model-cache-pvc
  namespace: ecommerce
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kafka-consumer
  namespace: ecommerce
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kafka-consumer
  template:
    metadata:
      labels:
        app: kafka-consumer
    spec:
      containers:
        - name: consumer
          image: backend:latest
          command:
            - python
            - -m
            - backend.kafka_consumer
          env:
            - name: KAFKA_BOOTSTRAP_SERVERS
              valueFrom:
                secretKeyRef:
                  name: kafka-credentials
                  key: bootstrap-servers
            - name: KAFKA_SASL_USERNAME
              valueFrom:
                secretKeyRef:
                  name: kafka-credentials
                  key: sasl-username
            - name: KAFKA_SASL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: kafka-credentials
                  key: sasl-password
            - name: KAFKA_TOPIC_PRODUCT_INGEST
              value: product-ingest
            - name: KAFKA_TOPIC_DLQ
              value: product-ingest-dlq
            - name: KAFKA_GROUP_ID
              value: product-ingestion
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: database-url
                  key: url
            - name: CHROMA_DB_PATH
              value: /app/data/chroma_shipping_db
            - name: SENTENCE_TRANSFORMERS_HOME
              value: /cache
          volumeMounts:
            - name: chroma-storage
              mountPath: /app/data/chroma_shipping_db
            - name: model-cache
              mountPath: /cache
          resources:
            requests:
              memory: 512Mi
              cpu: 250m
            limits:
              memory: 2Gi
              cpu: 1
      volumes:
        - name: chroma-storage
          persistentVolumeClaim:
            claimName: chroma-pvc
        - name: model-cache
          persistentVolumeClaim:
            claimName: model-cache-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: kafka-consumer
  namespace: ecommerce
spec:
  ports:
    - port: 8000
      targetPort: 8000
  selector:
    app: kafka-consumer
